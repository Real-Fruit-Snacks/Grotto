name: Bug Report
description: Report a bug in Grotto
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you running Grotto on?
      options:
        - Linux
        - Windows
        - Cross-platform (Linux <-> Windows)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Build Info
      description: How was the binary built? (e.g., `make all`, `./build.sh`, `./build.sh --baked`)
      placeholder: "./build.sh"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start listener: `./grotto -l -p 4444 -k <key>`
        2. Connect client: `./grotto -c 127.0.0.1 -p 4444 -k <key>`
        3. Send data...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Ubuntu 24.04 / Windows 11
        - NASM version: 2.16.01
        - Linker: GNU ld 2.42
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
