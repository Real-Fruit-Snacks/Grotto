<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: sapphire to lavender -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="40%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Accent gradient: teal to sapphire -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>

    <!-- Arch gradient: sapphire to lavender vertical -->
    <linearGradient id="gArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Flow line gradient: teal horizontal -->
    <linearGradient id="gFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="50%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#74c7ec" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#74c7ec" opacity="0.04"/>

    <!-- === THE CAVE PASSAGE === -->

    <!-- Arch / cave opening — dominant inverted-U bezier -->
    <path d="M 48 105 L 48 62 C 48 30, 80 18, 80 18 C 80 18, 112 30, 112 62 L 112 105"
          stroke="url(#gArch)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Left pillar supporting the arch -->
    <line x1="48" y1="105" x2="48" y2="115"
          stroke="#7f849c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Right pillar supporting the arch -->
    <line x1="112" y1="105" x2="112" y2="115"
          stroke="#7f849c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Horizontal data flow line through the arch passage -->
    <line x1="30" y1="85" x2="130" y2="85"
          stroke="url(#gFlow)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

    <!-- Lock/encryption symbol at the apex of the arch -->
    <!-- Lock body (circle) -->
    <circle cx="80" cy="24" r="4" fill="#89b4fa" opacity="0.95"/>
    <!-- Lock shackle (small rectangle below) -->
    <rect x="77" y="28" width="6" height="4" rx="1" fill="#89b4fa" opacity="0.85"/>

    <!-- Entry node — left, outside the arch -->
    <circle cx="30" cy="85" r="3" fill="#94e2d5" opacity="0.8"/>

    <!-- Exit node — right, outside the arch -->
    <circle cx="130" cy="85" r="3" fill="#b4befe" opacity="0.8"/>

    <!-- Encrypted data particles scattered inside the arch space -->
    <circle cx="65" cy="55" r="1.5" fill="#94e2d5" opacity="0.5"/>
    <circle cx="90" cy="48" r="1.2" fill="#74c7ec" opacity="0.45"/>
    <circle cx="75" cy="70" r="1.3" fill="#89b4fa" opacity="0.4"/>
    <circle cx="95" cy="65" r="1.5" fill="#b4befe" opacity="0.5"/>
    <circle cx="60" cy="78" r="1.0" fill="#74c7ec" opacity="0.35"/>
    <circle cx="100" cy="75" r="1.2" fill="#94e2d5" opacity="0.4"/>
    <circle cx="80" cy="60" r="1.4" fill="#89dceb" opacity="0.45"/>
    <circle cx="70" cy="42" r="1.0" fill="#b4befe" opacity="0.35"/>
    <circle cx="88" cy="38" r="1.1" fill="#74c7ec" opacity="0.3"/>
    <circle cx="85" cy="95" r="1.3" fill="#94e2d5" opacity="0.4"/>
    <circle cx="72" cy="98" r="1.0" fill="#89b4fa" opacity="0.35"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#89dceb" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#89b4fa" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "GROTTO" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="14"
        fill="url(#g1)" text-anchor="middle">GROTTO</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">ENCRYPTED NETWORKING IN ASSEMBLY</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">NASM  ·  CHACHA20  ·  POLY1305  ·  ~8KB</text>
</svg>
