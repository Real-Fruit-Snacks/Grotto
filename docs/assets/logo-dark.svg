<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: sapphire to lavender -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="40%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Accent gradient: teal to sapphire -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="50%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#74c7ec" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#74c7ec" opacity="0.04"/>

    <!-- Flow stream 1: top-left to bottom-right (forward data) -->
    <path d="M 38 45 C 58 35, 68 55, 80 50 C 92 45, 102 65, 122 55"
          stroke="url(#g2)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Flow stream 2: bottom-left to top-right (return data) -->
    <path d="M 38 85 C 58 95, 68 75, 80 80 C 92 85, 102 65, 122 75"
          stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- Center crossing point -->
    <circle cx="80" cy="65" r="5" fill="url(#g3)" opacity="0.9"/>
    <circle cx="80" cy="65" r="2.5" fill="#1e1e2e"/>
    <circle cx="80" cy="65" r="8" fill="none" stroke="#74c7ec" stroke-width="0.5" opacity="0.3"/>

    <!-- Entry/exit nodes -->
    <circle cx="38" cy="45" r="3" fill="#94e2d5" opacity="0.7"/>
    <circle cx="122" cy="55" r="3" fill="#74c7ec" opacity="0.7"/>
    <circle cx="38" cy="85" r="3" fill="#89b4fa" opacity="0.7"/>
    <circle cx="122" cy="75" r="3" fill="#b4befe" opacity="0.7"/>

    <!-- Flow particles -->
    <circle cx="55" cy="40" r="1.5" fill="#94e2d5" opacity="0.5"/>
    <circle cx="67" cy="50" r="1.2" fill="#74c7ec" opacity="0.4"/>
    <circle cx="95" cy="48" r="1.5" fill="#89b4fa" opacity="0.5"/>
    <circle cx="110" cy="53" r="1.2" fill="#74c7ec" opacity="0.4"/>

    <circle cx="55" cy="90" r="1.5" fill="#89b4fa" opacity="0.5"/>
    <circle cx="67" cy="80" r="1.2" fill="#74c7ec" opacity="0.4"/>
    <circle cx="95" cy="82" r="1.5" fill="#b4befe" opacity="0.5"/>
    <circle cx="110" cy="73" r="1.2" fill="#89b4fa" opacity="0.4"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#89dceb" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#89b4fa" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "GROTTO" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="14"
        fill="url(#g1)" text-anchor="middle">GROTTO</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">ENCRYPTED NETWORKING IN ASSEMBLY</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">NASM  ·  CHACHA20  ·  POLY1305  ·  ~8KB</text>
</svg>
